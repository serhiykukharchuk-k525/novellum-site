<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Nóvellum</title>
  <link rel="preload" href="https://novellum.co/assets/fonts/manrope-cyrillic-ext.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="https://novellum.co/assets/fonts/manrope-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="https://novellum.co/assets/fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" href="https://novellum.co/assets/favicon/favicon.ico" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="https://novellum.co/assets/favicon/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="https://novellum.co/assets/favicon/apple-touch-icon.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="https://novellum.co/assets/favicon/favicon-green.ico" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="32x32" href="https://novellum.co/assets/favicon/favicon-32x32-green.png" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="https://novellum.co/assets/favicon/apple-touch-icon-green.png" media="(prefers-color-scheme: light)">
  <style>
    @font-face{font-family:'Manrope';font-style:normal;font-weight:400 800;font-display:swap;src:url('https://novellum.co/assets/fonts/manrope-cyrillic-ext.woff2') format('woff2');unicode-range:U+0460-052F,U+1C80-1C8A,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F}
    @font-face{font-family:'Manrope';font-style:normal;font-weight:400 800;font-display:swap;src:url('https://novellum.co/assets/fonts/manrope-cyrillic.woff2') format('woff2');unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116}
    @font-face{font-family:'Manrope';font-style:normal;font-weight:400 800;font-display:swap;src:url('https://novellum.co/assets/fonts/manrope-latin.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
    :root{
      --bg:#0B1016;
      --text:#F4EFE5;
      --text-muted:rgba(244,239,229,.55);
      --text-soft:rgba(244,239,229,.38);
      --brand-2:#1f4a36;
      --brand-hi:#2b6b4f;
      --bronze:#D4B886;
      --bronze-bright:#E8C896;
      --line:rgba(212,184,134,.12);
      --radius-pill:999px;
      --btn-pad-y:11px;
      --btn-pad-x:18px;
      --top-accent:linear-gradient(90deg, rgba(15,31,28,0), rgba(26,46,40,.9), rgba(212,184,134,.55), rgba(15,31,28,0));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:"Manrope",system-ui,sans-serif;
      color:var(--text);
      line-height:1.7;
      letter-spacing:.01em;
      background:var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
    }
    body::before{
      content:"";
      position:fixed;inset:0;
      pointer-events:none;
      opacity:.22;
      background:
        linear-gradient(to bottom,rgba(255,255,255,.02),transparent 35%),
        repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 120px),
        repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0,rgba(255,255,255,.02) 1px,transparent 1px,transparent 120px);
      mix-blend-mode:overlay;
    }
    a{color:inherit;text-decoration:none}
    .container{width:min(1160px,92vw);margin:0 auto}

    header{
      padding:20px 0;
      border-bottom:1px solid var(--line);
      flex-shrink:0;
    }
    .logo img{height:32px;width:auto}
    .logo .logo-mark{display:none}
    @media(max-width:640px){
      .logo .logo-horizontal{display:none}
      .logo .logo-mark{display:block;height:26px}
    }

    main{
      flex:1;
      display:flex;align-items:center;justify-content:center;
      min-height:0;
      padding:24px 0;
    }
    .error-wrap{
      text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:22px;
    }

    .error-code{
      font-size:clamp(64px,12vw,120px);
      font-weight:800;
      line-height:1;
      letter-spacing:-.04em;
      color:var(--text);
      position:relative;
      user-select:none;
    }
    .error-code::after{
      content:"";
      display:block;
      margin:14px auto 0;
      width:64px;height:2px;
      background:var(--top-accent);
      border-radius:2px;
    }

    .error-title{
      font-size:clamp(1.1rem,2.6vw,1.4rem);
      font-weight:700;
      color:var(--text);
    }
    .error-desc{
      font-size:.95rem;
      color:var(--text-muted);
      line-height:1.6;
      max-width:420px;
      margin-top:8px;
    }

    .error-box{
      border-top:1px solid var(--line);
      padding-top:22px;
      display:flex;flex-direction:column;align-items:center;gap:18px;
      max-width:520px;width:100%;
    }

    .btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .button{
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      padding:var(--btn-pad-y) var(--btn-pad-x);
      border-radius:var(--radius-pill);
      font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;border:1px solid transparent;
      transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
      white-space:nowrap;
    }
    .button.primary{
      background:var(--bronze);
      color:#0F1F1C;
      box-shadow:0 8px 28px rgba(212,184,134,.22);
    }
    .button.primary:hover{
      background:var(--bronze-bright);
      box-shadow:0 12px 36px rgba(212,184,134,.32);
      transform:translateY(-2px);
    }
    .button.secondary{
      border-color:rgba(255,255,255,.16);
      color:var(--text);
      background:rgba(0,0,0,.08);
    }
    .button.secondary:hover{
      border-color:rgba(212,184,134,.28);
      transform:translateY(-2px);
    }

    .nav-links{
      display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    }
    .nav-link{
      font-size:.78rem;color:var(--text-soft);
      padding:5px 12px;
      border-radius:var(--radius-pill);
      border:1px solid rgba(255,255,255,.06);
      transition:all .15s;
    }
    .nav-link:hover{color:var(--text);border-color:var(--line);background:rgba(255,255,255,.04)}

    footer{
      border-top:1px solid var(--line);
      padding:16px 0;
      flex-shrink:0;
    }
    .footer-inner{
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:10px;
    }
    .footer-copy{font-size:.72rem;color:var(--text-soft)}
    .footer-nav{display:flex;gap:14px}
    .footer-nav a{font-size:.76rem;color:var(--text-soft);transition:color .15s}
    .footer-nav a:hover{color:var(--text)}

    @media(max-height:640px){
      .error-code{font-size:clamp(48px,10vw,80px)}
      main{padding:16px 0}
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <a class="logo" href="https://novellum.co">
      <img class="logo-horizontal" src="https://novellum.co/assets/logo/novellum-horizontal.svg" alt="Nóvellum" />
      <img class="logo-mark" src="https://novellum.co/assets/logo/novellum-mark.svg" alt="Nóvellum" />
    </a>
  </div>
</header>

<main>
  <div class="container">
    <div class="error-wrap">
      <div class="error-code">404</div>

      <div>
        <p class="error-title">Сторінку не знайдено</p>
        <p class="error-desc">Схоже, ця адреса більше не існує або була переміщена. Але решта сайту — на місці.</p>
      </div>

      <div class="error-box">
        <div class="btn-group">
          <a class="button primary" href="https://novellum.co">← На головну</a>
          <a class="button secondary" href="https://www.linkedin.com/in/serhiy-kukharchuk/" target="_blank" rel="noopener noreferrer">Написати в LinkedIn</a>
        </div>

        <div class="nav-links">
          <a class="nav-link" href="https://novellum.co#formats">Формати</a>
          <a class="nav-link" href="https://novellum.co#products">Продукти</a>
          <a class="nav-link" href="https://novellum.co#process">Процес</a>
          <a class="nav-link" href="https://novellum.co#calculator">Калькулятор</a>
          <a class="nav-link" href="https://novellum.co/partners.html">Партнерство</a>
          <a class="nav-link" href="https://novellum.co#contact">Контакти</a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-inner">
      <span class="footer-copy">© <span id="year"></span> ФОП Кухарчук Сергій Миколайович</span>
      <nav class="footer-nav">
        <a href="https://novellum.co/legal/Privacy-Policy.pdf" target="_blank" rel="noopener">Конфіденційність</a>
        <a href="https://novellum.co/legal/Terms-of-Use.pdf" target="_blank" rel="noopener">Умови</a>
        <a href="https://novellum.co/legal/public-offer.pdf" target="_blank" rel="noopener">Публічна оферта</a>
      </nav>
    </div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
